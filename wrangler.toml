name = "love"
main = "src/bot.ts"
compatibility_date = "2026-06-17"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/3 * * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Secrets are managed via Cloudflare Dashboard or:
#   wrangler secret put BOT_TOKEN
#   wrangler secret put WEATHER_API_KEY
#   wrangler secret put CAT_API_KEY
#   wrangler secret put DOG_API_KEY
#   wrangler secret put QUOTE_CHANNEL_ID
#   wrangler secret put QUOTE_MESSAGE_ID
